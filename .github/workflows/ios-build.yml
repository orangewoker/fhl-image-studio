name: Build unsigned Flutter iOS IPA

on:
  push:
    branches: [ios]
    paths:
      - 'ios-shell/**'
      - 'image-studio/frontend/**'
      - 'shared/**'
      - 'scripts/prepare-ios-frontend.mjs'
      - '.github/workflows/ios-build.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ios-unsigned-ipa-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-unsigned-ipa:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: image-studio/frontend/package-lock.json

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build shared mobile frontend
        working-directory: image-studio/frontend
        run: |
          npm ci
          npm test
          npm run build:android
          node ../../scripts/prepare-ios-frontend.mjs
          test -n "$(find ../../ios-shell/assets/web/assets -name '*.js' -print -quit)"
          test -n "$(find ../../ios-shell/assets/web/assets -name '*.css' -print -quit)"

      - name: Resolve Flutter dependencies
        working-directory: ios-shell
        run: flutter pub get

      - name: Analyze Flutter app
        working-directory: ios-shell
        run: flutter analyze --no-pub

      - name: Test Flutter app
        working-directory: ios-shell
        run: flutter test --no-pub

      - name: Build unsigned iOS app
        working-directory: ios-shell
        run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        id: package
        working-directory: ios-shell
        shell: bash
        run: |
          set -euo pipefail
          VERSION_BUILD="$(awk '/^version:/{print $2}' pubspec.yaml)"
          VERSION="${VERSION_BUILD%%+*}"
          BUILD="${VERSION_BUILD##*+}"
          APP="build/ios/iphoneos/Runner.app"
          test -d "$APP"
          test ! -e "$APP/embedded.mobileprovision"
          test -n "$(find "$APP" -path '*flutter_assets/assets/web/assets/*.js' -print -quit)"
          test -n "$(find "$APP" -path '*flutter_assets/assets/web/assets/*.css' -print -quit)"
          rm -rf build/ios/unsigned-ipa
          mkdir -p build/ios/unsigned-ipa/Payload
          ditto "$APP" build/ios/unsigned-ipa/Payload/Runner.app
          (
            cd build/ios/unsigned-ipa
            zip -qry "../AI-Runner-${VERSION}-unsigned.ipa" Payload
          )
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "build=$BUILD" >> "$GITHUB_OUTPUT"
          echo "ipa=ios-shell/build/ios/AI-Runner-${VERSION}-unsigned.ipa" >> "$GITHUB_OUTPUT"

      - uses: actions/upload-artifact@v4
        with:
          name: FHL-Image-Studio-iOS-unsigned
          path: ${{ steps.package.outputs.ipa }}
          if-no-files-found: error

      - name: Publish unsigned IPA prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ios-v${{ steps.package.outputs.version }}
          target_commitish: ${{ github.sha }}
          name: FHL Image Studio iOS ${{ steps.package.outputs.version }}
          body: |
            FHL Image Studio iOS unsigned IPA.
            Build: ${{ steps.package.outputs.build }}
            This package contains no embedded provisioning profile and is intended for local re-signing/sideloading.
          prerelease: true
          files: ${{ steps.package.outputs.ipa }}
