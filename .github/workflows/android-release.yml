name: Android Release

on:
  push:
    tags:
      - "v*-android"
  workflow_dispatch:
    inputs:
      version_name:
        description: "Android version name"
        required: false
        default: "2.0.1"
        type: string
      version_code:
        description: "Android version code"
        required: false
        default: "2010000"
        type: string

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: image-studio/frontend/package-lock.json

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        shell: bash
        run: sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0"

      - name: Set up Gradle 8.7
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Safety scan
        shell: pwsh
        run: ./scripts/check-android-release-safety.ps1 -Root "$PWD"

      - name: Install frontend dependencies
        working-directory: image-studio/frontend
        shell: bash
        run: npm ci

      - name: Run frontend tests
        working-directory: image-studio/frontend
        shell: bash
        run: npm test

      - name: Build Android frontend
        working-directory: image-studio/frontend
        shell: bash
        run: npm run build:android

      - name: Write Android local.properties
        shell: bash
        run: printf 'sdk.dir=%s\n' "$ANDROID_HOME" > android-shell/local.properties

      - name: Build APK
        shell: bash
        env:
          IMAGE_STUDIO_ANDROID_USE_PREBUILT_FRONTEND: "1"
          IMAGE_STUDIO_ANDROID_VERSION_NAME: ${{ github.event.inputs.version_name || '2.0.1' }}
          IMAGE_STUDIO_ANDROID_VERSION_CODE: ${{ github.event.inputs.version_code || '2010000' }}
        run: gradle -p android-shell --no-daemon assembleRelease

      - name: Verify APK
        shell: bash
        run: "$ANDROID_HOME/build-tools/34.0.0/apksigner" verify -v android-shell/app/build/outputs/apk/release/app-release.apk

      - name: Package APK zip
        id: package
        shell: bash
        run: |
          mkdir -p dist
          cp android-shell/app/build/outputs/apk/release/app-release.apk "dist/FHL-Image-Studio方汤圆版-V2.0.1-Android-Release.apk"
          (cd dist && zip -9 "FHL-Image-Studio方汤圆版-V2.0.1-Android-Release.zip" "FHL-Image-Studio方汤圆版-V2.0.1-Android-Release.apk")
          sha256sum dist/*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: fhl-image-studio-android-v2.0.1
          path: dist/*
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: FHL Image Studio 方汤圆版 V2.0.1 Android
          body_path: RELEASE_NOTES_V2.0.1_ANDROID.md
          files: dist/*
