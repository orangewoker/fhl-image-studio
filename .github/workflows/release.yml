name: Release

on:
  push:
    tags:
      - "v2.0.2"

permissions:
  contents: write

jobs:
  windows-portable:
    name: Build Windows portable package
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"
          cache-dependency-path: |
            go-cli/go.sum
            image-studio/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: image-studio/frontend/package-lock.json
      - name: Install Wails CLI
        shell: pwsh
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest
      - name: Build portable package
        shell: pwsh
        run: .\scripts\package-windows-portable-v2.0.2.ps1 -OutputRoot "$env:RUNNER_TEMP\release-assets"
      - name: Check portable package safety
        shell: pwsh
        run: |
          $root = Join-Path $env:RUNNER_TEMP "release-assets\FHL-Image-Studio-Desktop-V2.0.2-Windows-Portable"
          $zip = Join-Path $env:RUNNER_TEMP "release-assets\FHL-Image-Studio-Desktop-V2.0.2-Windows-Portable.zip"
          .\scripts\check-release-safety.ps1 -ReleaseRoot $root -ZipPath $zip
      - uses: actions/upload-artifact@v4
        with:
          name: FHL-Image-Studio-Desktop-V2.0.2-Windows-Portable
          path: ${{ runner.temp }}\release-assets\FHL-Image-Studio-Desktop-V2.0.2-Windows-Portable.zip
      - uses: softprops/action-gh-release@v2
        with:
          name: Desktop V2.0.2
          body_path: RELEASE_NOTES_DESKTOP_V2.0.2.md
          files: ${{ runner.temp }}\release-assets\FHL-Image-Studio-Desktop-V2.0.2-Windows-Portable.zip
